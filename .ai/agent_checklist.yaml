# CAN-Dash AI 开发检查清单
# AI Agent 每次迭代前必须逐项确认

build_verify:
  - "cmake -B build && cmake --build build 成功，无 link 错误"
  - "cd build && ctest --output-on-failure 所有测试通过"
  - "binary 大小 > 0 字节 (ls -la build/can-dash)"

code_quality:
  - "Layer 2 代码无 Qt include（纯 C++）"
  - "Layer 2 代码无 new/malloc（全部 static/栈）"
  - "display_key 名称在三处完全一致：can_ids.yaml / dashboard_backend_qt.cpp / QML Connections"
  - "DisplayData dd = {} 后有 memset(&dd, 0, sizeof(dd))"
  - "updatedMask 位扫描后才对 m_displayData 赋值"
  - "QML 使用 property real 而非 property float"
  - "QML Connections 用 function onXxx() {} 新语法"

yaml_workflow:
  - "python tools/validate.py 通过后再运行 yaml_to_c.py"
  - "python tools/yaml_to_c.py 后运行 python tools/fix_generated.py src/generated"
  - "新增 CAN ID 已在 can_ids.yaml 定义"
  - "seat_belt.yaml 的 can_ids 也在 can_ids.yaml 定义"
  - "跨文件引用 display_key 已定义（validate.py 检查）"

qml_notes:
  - "根元素是 ApplicationWindow（QQmlApplicationEngine 需要）"
  - "修改 src/ui/*.qml 后手动 cp src/ui/*.qml build/qml/"
  - "QML 的 text 绑定用 Connections + 直接赋值，不用惰性 binding"
  - "报警横幅/语言按钮有 z: 10 / z: 20 避免被表盘遮挡"
  - "不用 property float，用 property real"
  - "signal handler 只支持单表达式，不支持分号隔开多条"

git_ops:
  - "commit message 清晰描述本次改动"
  - "每次 commit 只做一件事"
  - "push 前 git pull --rebase（避免 workflow scope 问题）"
  - "确认 remote 是 https://github.com/pixelpiloter/can-dash.git"

headless_env:
  - "DISPLAY=:10.0 指向可用的 X server"
  - "设置 QT_PLUGIN_PATH, QML2_IMPORT_PATH, QT_QUICK_BACKEND=software"
  - "xauth list 有 MIT-MAGIC-COOKIE"
  - "VMware 环境用 QT_QPA_PLATFORM=xcb"

debug_tips:
  - "C++ 数据层：qDebug() << 'CAN: speed=' << m_displayData.value('vehicle_speed')"
  - "QML 信号：Connections { function onDisplayDataChanged() { console.log(...) } }"
  - "socket 连接：ss --unix | grep can_dash 确认 ESTAB"
  - "多进程：ps aux | grep -E 'can-dash|python3.*engine'"
  - "确认 engine.py 和 can-dash 是当前 session 启动的进程"

common_errors:
  - "link error undefined reference to setIndicator(QString,bool) -> cpp 缺少 2 参数重载"
  - "QML property float -> 改为 property real"
  - "QML binding 不更新 -> Connections + 直接赋值方案"
  - "数据永远为零 -> can_converter.cpp 没有写入 DisplayData"
  - "帧边界错误 -> 添加 byte_start >= len 检查"
