# 指示灯定义
indicators:
  - id: "bat_warn_light"
    type: "light"
    image_on: "warning_bat_red.png"
    image_off: "warning_bat_dim.png"
    size: { width: 60, height: 60 }
    position: { x: 600, y: 260 }
    flash_on_fault: true

  - id: "soc_warn_light"
    type: "light"
    image_on: "warning_soc_orange.png"
    image_off: "warning_soc_dim.png"
    size: { width: 60, height: 60 }
    position: { x: 660, y: 260 }

  - id: "motor_warn_light"
    type: "light"
    image_on: "warning_motor_red.png"
    image_off: "warning_motor_dim.png"
    size: { width: 60, height: 60 }
    position: { x: 720, y: 260 }

  - id: "ready_go_light"
    type: "light"
    image_on: "ready_go_green.png"
    image_off: "ready_go_dim.png"
    size: { width: 60, height: 60 }
    position: { x: 780, y: 260 }

  - id: "high_voltage_light"
    type: "light"
    image_on: "hv_orange.png"
    image_off: "hv_dim.png"
    size: { width: 50, height: 50 }
    position: { x: 20, y: 20 }
